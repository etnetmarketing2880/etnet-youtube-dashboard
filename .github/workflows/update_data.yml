name: Update YouTube Analytics Data

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-auth google-auth-oauthlib google-api-python-client pandas python-dateutil

      - name: Write credentials and tokens
        env:
          TOKEN_ETNET:    ${{ secrets.TOKEN_ETNET }}
          TOKEN_25DEG:    ${{ secrets.TOKEN_25DEG }}
          TOKEN_HEALTH:   ${{ secrets.TOKEN_HEALTH }}
          SECRET_ETNET:   ${{ secrets.SECRET_ETNET }}
          SECRET_25DEG:   ${{ secrets.SECRET_25DEG }}
          SECRET_HEALTH:  ${{ secrets.SECRET_HEALTH }}
        run: |
          echo "=== Writing client secret files ==="
          
          if [ -n "$SECRET_ETNET" ]; then
            echo "$SECRET_ETNET" > client_secret_etnet.json
            echo "OK client_secret_etnet.json"
          fi

          if [ -n "$SECRET_25DEG" ]; then
            echo "$SECRET_25DEG" > client_secret_25degrees.json
            echo "OK client_secret_25degrees.json"
          fi

          if [ -n "$SECRET_HEALTH" ]; then
            echo "$SECRET_HEALTH" > client_secret_health.json
            echo "OK client_secret_health.json"
          fi

          echo "=== Decoding token files ==="
          
          if [ -n "$TOKEN_ETNET" ]; then
            echo "$TOKEN_ETNET" | base64 -d > token_etnet.pickle && echo "OK token_etnet.pickle" || echo "FAIL TOKEN_ETNET"
          fi

          if [ -n "$TOKEN_25DEG" ]; then
            echo "$TOKEN_25DEG" | base64 -d > "token_25度生活.pickle" && echo "OK token_25度生活.pickle" || echo "FAIL TOKEN_25DEG"
          fi

          if [ -n "$TOKEN_HEALTH" ]; then
            echo "$TOKEN_HEALTH" | base64 -d > "token_健康好人生.pickle" && echo "OK token_健康好人生.pickle" || echo "FAIL TOKEN_HEALTH"
          fi

      - name: Check files
        run: |
          echo "=== Check files ==="
          ls -la *.pickle 2>/dev/null || echo "No pickle files"
          ls -la *.json 2>/dev/null || echo "No JSON files"

      - name: Run analytics script
        run: python etnet_youtube_analytics.py
        continue-on-error: true

      - name: List generated files
        run: |
          echo "=== Generated CSV files ==="
          ls -la *.csv 2>/dev/null || echo "No CSV files"

      - name: Move CSVs to data folder
        run: |
          mkdir -p data
          for f in channel_overview.csv daily_analytics.csv monthly_analytics.csv yearly_analytics.csv top_videos_this_month.csv; do
            if [ -f "$f" ]; then
              cp "$f" data/
              echo "OK $f"
            fi
          done
          ls -la data/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Auto-update YouTube data $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin main
